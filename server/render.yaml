services:
  - type: web
    name: penagent-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npx prisma generate && npx tsc
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: API_URL
        value: https://api.buzrig.com
      - key: CLIENT_URL
        value: https://buzrig.com
      - key: DATABASE_URL
        fromDatabase:
          name: penagent-db
          property: connectionString
      - key: REDIS_URL
        value: "" # Set manually from Upstash
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"

databases:
  - name: penagent-db
    plan: free
    region: oregon
